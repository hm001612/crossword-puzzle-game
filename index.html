<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>填字游戏生成器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-600: #2563eb;
      --blue-500: #3b82f6;
      --blue-100: #dbeafe;
      --blue-50:  #eff6ff;
      --gray-900: #111827;
      --gray-700: #374151;
      --gray-500: #6b7280;
      --gray-300: #d1d5db;
      --gray-100: #f3f4f6;
      --yellow-200: #fef08a;
      --green-500: #22c55e;
      --red-400: #f87171;
      --cell-size: 40px;
      --cell-size-zh: 48px;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--gray-100);
      color: var(--gray-900);
      min-height: 100vh;
    }

    header {
      background: var(--blue-600);
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(37,99,235,.35);
    }
    header svg { flex-shrink: 0; }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: .02em; }
    header p  { font-size: .8rem; opacity: .85; }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .panel {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      overflow: hidden;
    }
    .panel-header {
      background: var(--blue-600);
      color: #fff;
      padding: 14px 18px;
      font-weight: 600;
      font-size: .95rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-body { padding: 16px; }

    .section-label {
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--gray-500);
      margin-bottom: 8px;
    }

    #word-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }

    .word-row {
      display: grid;
      grid-template-columns: 1fr 1fr 32px;
      gap: 6px;
      align-items: center;
    }
    .word-row input {
      border: 1px solid var(--gray-300);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: .88rem;
      transition: border-color .15s;
      width: 100%;
    }
    .word-row input:focus { outline: none; border-color: var(--blue-500); box-shadow: 0 0 0 3px var(--blue-100); }
    .word-row input::placeholder { color: var(--gray-500); }

    .btn-del {
      background: none;
      border: 1px solid var(--gray-300);
      border-radius: 6px;
      width: 32px; height: 32px;
      cursor: pointer;
      color: var(--gray-500);
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
    }
    .btn-del:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }

    .row-actions { display: flex; gap: 8px; margin-bottom: 16px; }
    .btn-add {
      flex: 1;
      padding: 8px;
      border: 1.5px dashed var(--blue-500);
      background: var(--blue-50);
      color: var(--blue-600);
      border-radius: 6px;
      cursor: pointer;
      font-size: .85rem;
      font-weight: 500;
      transition: background .15s;
    }
    .btn-add:hover { background: var(--blue-100); }
    .btn-preset {
      padding: 8px 12px;
      border: 1px solid var(--gray-300);
      background: #fff;
      color: var(--gray-700);
      border-radius: 6px;
      cursor: pointer;
      font-size: .82rem;
      transition: background .15s;
    }
    .btn-preset:hover { background: var(--gray-100); }

    .btn-generate {
      width: 100%;
      padding: 12px;
      background: var(--blue-600);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-generate:hover  { background: #1d4ed8; }
    .btn-generate:active { transform: scale(.98); }

    .clue-section { margin-top: 18px; }
    .clue-direction {
      font-size: .82rem;
      font-weight: 700;
      color: var(--blue-600);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .clue-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
    .clue-item {
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .83rem;
      color: var(--gray-700);
      transition: background .12s;
      display: flex; gap: 8px;
    }
    .clue-item:hover { background: var(--blue-50); }
    .clue-item.active { background: var(--blue-100); color: var(--blue-600); font-weight: 600; }
    .clue-num { font-weight: 700; color: var(--blue-600); min-width: 22px; }

    .game-panel { display: flex; flex-direction: column; gap: 16px; }

    .toolbar {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .toolbar-btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid var(--gray-300);
      background: #fff;
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .12s, color .12s;
      display: flex; align-items: center; gap: 6px;
    }
    .toolbar-btn:hover { background: var(--gray-100); }
    .toolbar-btn.primary { background: var(--blue-600); color: #fff; border-color: var(--blue-600); }
    .toolbar-btn.primary:hover { background: #1d4ed8; }
    .toolbar-btn.success { background: var(--green-500); color: #fff; border-color: var(--green-500); }
    .toolbar-btn.success:hover { background: #16a34a; }

    .grid-wrapper {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 24px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 300px;
      overflow: auto;
    }

    #crossword-grid {
      display: inline-grid;
      gap: 2px;
      border: 2px solid var(--gray-900);
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      border: 1px solid var(--gray-300);
      position: relative;
      background: #fff;
      cursor: pointer;
      user-select: none;
      transition: background .1s;
    }
    .cell.black {
      background: var(--gray-900);
      cursor: default;
      border-color: var(--gray-900);
    }
    .cell.highlighted { background: var(--blue-50); }
    .cell.selected   { background: var(--blue-100); }
    .cell.correct    { background: #dcfce7; }
    .cell.incorrect  { background: #fee2e2; }
    .cell.revealed   { background: var(--yellow-200); }

    .cell-number {
      position: absolute;
      top: 2px; left: 2px;
      font-size: 9px;
      font-weight: 700;
      color: var(--gray-700);
      line-height: 1;
      pointer-events: none;
    }
    .cell-letter {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--gray-900);
      text-transform: uppercase;
      pointer-events: none;
    }

    .empty-state {
      text-align: center;
      color: var(--gray-500);
      padding: 40px 20px;
    }
    .empty-state svg { margin-bottom: 12px; opacity: .4; }
    .empty-state p { font-size: .9rem; }

    .status-bar {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 10px 16px;
      font-size: .85rem;
      color: var(--gray-700);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gray-300);
      flex-shrink: 0;
    }
    .status-dot.active { background: var(--green-500); }

    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--gray-900);
      color: #fff;
      padding: 10px 22px;
      border-radius: 24px;
      font-size: .88rem;
      font-weight: 500;
      pointer-events: none;
      transition: transform .3s ease;
      z-index: 999;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      :root { --cell-size: 34px; }
    }
    @media (max-width: 480px) {
      :root { --cell-size: 28px; --cell-size-zh: 38px; }
      .toolbar-btn span { display: none; }
    }
    /* Chinese mode */
    .lang-zh .cell {
      width: var(--cell-size-zh);
      height: var(--cell-size-zh);
    }
    .lang-zh .cell-letter {
      font-size: 18px;
      font-family: "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
      font-weight: 500;
    }
    .lang-zh .cell-number { font-size: 7px; }

    /* difficulty */
    .difficulty-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      align-items: center;
    }
    .diff-label {
      font-size: .75rem;
      font-weight: 600;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
      margin-right: 4px;
    }
    .diff-btn {
      flex: 1;
      padding: 7px 4px;
      border: 1.5px solid var(--gray-300);
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: .8rem;
      font-weight: 500;
      color: var(--gray-700);
      transition: all .15s;
      text-align: center;
    }
    .diff-btn:hover  { border-color: var(--blue-500); color: var(--blue-600); background: var(--blue-50); }
    .diff-btn.active { border-color: var(--blue-600); background: var(--blue-600); color: #fff; font-weight: 700; }

    .btn-random {
      width: 100%;
      margin-top: 8px;
      margin-bottom: 12px;
      padding: 10px;
      background: #fff;
      color: var(--blue-600);
      border: 1.5px solid var(--blue-500);
      border-radius: var(--radius);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-random:hover { background: var(--blue-50); }

    .divider {
      border: none;
      border-top: 1px dashed var(--gray-300);
      margin: 14px 0;
    }


    /* library & grade selector */
    .lib-bar  { display:flex; gap:6px; margin-bottom:10px; }
    .lib-btn  {
      flex:1; padding:7px 4px; border:1.5px solid var(--gray-300);
      border-radius:6px; background:#fff; cursor:pointer;
      font-size:.8rem; font-weight:500; color:var(--gray-700);
      transition:all .15s; text-align:center;
    }
    .lib-btn:hover  { border-color:var(--blue-500); color:var(--blue-600); background:var(--blue-50); }
    .lib-btn.active { border-color:var(--blue-600); background:var(--blue-600); color:#fff; font-weight:700; }

    .grade-bar { display:flex; gap:4px; margin-bottom:10px; flex-wrap:wrap; }
    .grade-btn {
      flex:1; min-width:52px; padding:6px 2px;
      border:1.5px solid var(--gray-300); border-radius:6px;
      background:#fff; cursor:pointer; font-size:.78rem;
      font-weight:500; color:var(--gray-700); transition:all .15s; text-align:center;
    }
    .grade-btn:hover  { border-color:#7c3aed; color:#7c3aed; background:#f5f3ff; }
    .grade-btn.active { border-color:#7c3aed; background:#7c3aed; color:#fff; font-weight:700; }

    #pep-grades { animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

    @media print {
      /* Hide everything — only the print popup window is used */
      body > * { display: none !important; }
    }
  </style>
</head>
<body>

<input id="cell-capture" type="text"
  style="position:fixed;top:-200px;left:-200px;opacity:0;width:2px;height:2px;z-index:-1;"
  autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
    <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
  </svg>
  <div>
    <h1>填字游戏生成器</h1>
    <p>Crossword Puzzle Generator</p>
  </div>
</header>

<div class="layout">

  <!-- LEFT: Editor -->
  <div class="panel">
    <div class="panel-header">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      单词编辑器
    </div>
    <div class="panel-body">

      <!-- Language Mode -->
      <p class="section-label">语言模式</p>
      <div class="lib-bar" id="lang-bar">
        <button class="lib-btn active" data-lang="en">🔤 English</button>
        <button class="lib-btn" data-lang="zh">🀄 中文汉字</button>
      </div>

      <!-- Library Selector -->
      <p class="section-label" id="lib-label">词库选择</p>
      <div class="lib-bar" id="lib-bar-en">
        <button class="lib-btn active" data-lib="common">📚 3000常用词汇</button>
        <button class="lib-btn" data-lib="pep">🏫 人教版PEP小学</button>
      </div>
      <div id="lib-bar-zh" style="display:none;">
        <div class="lib-bar" style="flex-wrap:wrap;">
          <button class="lib-btn zh-cat active" data-zhcat="all">📖 全部</button>
          <button class="lib-btn zh-cat" data-zhcat="animal">🐾 动物</button>
          <button class="lib-btn zh-cat" data-zhcat="food">🍜 美食</button>
          <button class="lib-btn zh-cat" data-zhcat="chengyu">📜 成语</button>
          <button class="lib-btn zh-cat" data-zhcat="poem">🖋 诗词</button>
          <button class="lib-btn zh-cat" data-zhcat="diming">🗺 地名</button>
          <button class="lib-btn zh-cat" data-zhcat="lishi">🏛 历史</button>
          <button class="lib-btn zh-cat" data-zhcat="it">💻 科技</button>
          <button class="lib-btn zh-cat" data-zhcat="medical">🏥 医学</button>
          <button class="lib-btn zh-cat" data-zhcat="law">⚖ 法律</button>
          <button class="lib-btn zh-cat" data-zhcat="caijing">💹 财经</button>
          <button class="lib-btn zh-cat" data-zhcat="car">🚗 汽车</button>
        </div>
      </div>
      <div id="pep-grades" style="display:none;">
        <p class="section-label" style="margin-bottom:6px;">选择年级（可多选）</p>
        <div class="grade-bar">
          <button class="grade-btn active" data-grade="3">三年级</button>
          <button class="grade-btn active" data-grade="4">四年级</button>
          <button class="grade-btn active" data-grade="5">五年级</button>
          <button class="grade-btn active" data-grade="6">六年级</button>
        </div>
      </div>

      <!-- Difficulty + Random -->
      <p class="section-label">难度设置</p>
      <div class="difficulty-bar">
        <span class="diff-label">难度</span>
        <button class="diff-btn active" data-diff="easy">简单</button>
        <button class="diff-btn" data-diff="medium">中等</button>
        <button class="diff-btn" data-diff="hard">困难</button>
      </div>
      <button class="btn-random" id="btn-random">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
          <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
        </svg>
        随机生成游戏
      </button>

      <hr class="divider">
      <p class="section-label">自定义单词 &amp; 提示语</p>
      <div style="display:grid;grid-template-columns:1fr 1fr 32px;gap:6px;margin-bottom:4px;">
        <span id="word-col-label" style="font-size:.75rem;color:var(--gray-500);padding-left:4px;">单词（英文）</span>
        <span style="font-size:.75rem;color:var(--gray-500);padding-left:4px;">提示语</span>
        <span></span>
      </div>

      <div id="word-rows"></div>

      <div class="row-actions">
        <button class="btn-add" id="btn-add-row">+ 添加行</button>
        <button class="btn-preset" id="btn-preset">示例单词</button>
      </div>

      <button class="btn-generate" id="btn-generate">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        生成游戏
      </button>

      <div class="clue-section" id="clue-section" style="display:none;">
        <div class="clue-direction">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
          横向
        </div>
        <ul class="clue-list" id="across-clues"></ul>

        <div class="clue-direction" style="margin-top:12px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><polyline points="5 12 12 19 19 12"/>
          </svg>
          纵向
        </div>
        <ul class="clue-list" id="down-clues"></ul>
      </div>

    </div>
  </div>

  <!-- RIGHT: Game -->
  <div class="game-panel">

    <div class="toolbar">
      <button class="toolbar-btn success" id="btn-check">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        <span>检查答案</span>
      </button>
      <button class="toolbar-btn" id="btn-hint">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
        <span>显示提示</span>
      </button>
      <button class="toolbar-btn" id="btn-reset">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.66"/>
        </svg>
        <span>重置</span>
      </button>
      <button class="toolbar-btn primary" id="btn-print">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
        <span>打印</span>
      </button>
    </div>

    <div class="grid-wrapper">
      <div id="crossword-grid">
        <div class="empty-state">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <p>请在左侧输入单词并点击"生成游戏"</p>
        </div>
      </div>
    </div>

    <div class="status-bar" id="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">等待生成游戏...</span>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

/* ================================================================
   CROSSWORD ENGINE (inlined from crossword-engine.js)
   ================================================================ */

const HORIZONTAL = 'across';
const VERTICAL   = 'down';

class CrosswordGenerator {
  constructor(wordList) {
    if (!Array.isArray(wordList) || wordList.length === 0)
      throw new Error('wordList must be a non-empty array');

    this.wordList = wordList
      .filter(item => item && typeof item.word === 'string' && item.word.trim().length > 0)
      .map(item => ({ word: item.word.toUpperCase().trim(), clue: item.clue || '' }));

    if (this.wordList.length === 0) throw new Error('No valid words in wordList');

    this._GRID_SIZE = 50;
    this._OFFSET = Math.floor(this._GRID_SIZE / 2);
  }

  generate() {
    const rawGrid   = this._createRawGrid(this._GRID_SIZE, this._GRID_SIZE);
    const placedWords = [];
    const sortedWords = [...this.wordList].sort((a, b) => b.word.length - a.word.length);

    for (let i = 0; i < sortedWords.length; i++) {
      const { word, clue } = sortedWords[i];
      if (i === 0) {
        const row = this._OFFSET;
        const col = this._OFFSET - Math.floor(word.length / 2);
        this._placeWord(rawGrid, word, row, col, HORIZONTAL);
        placedWords.push({ word, clue, direction: HORIZONTAL, row, col });
      } else {
        const placed = this._tryPlaceWord(rawGrid, word, clue, placedWords);
        if (placed) placedWords.push(placed);
      }
    }

    const { grid, rowOffset, colOffset } = this._trimGrid(rawGrid);
    const adjustedWords = placedWords.map(pw => ({
      ...pw, row: pw.row - rowOffset, col: pw.col - colOffset,
    }));
    const numberedWords = this._numberWords(adjustedWords, grid);
    const rows = grid.length;
    const cols = rows > 0 ? grid[0].length : 0;
    return { grid, words: numberedWords, size: { rows, cols } };
  }

  _createRawGrid(rows, cols) {
    return Array.from({ length: rows }, () => Array(cols).fill(null));
  }

  _placeWord(rawGrid, word, row, col, direction) {
    for (let i = 0; i < word.length; i++) {
      if (direction === HORIZONTAL) rawGrid[row][col + i] = word[i];
      else rawGrid[row + i][col] = word[i];
    }
  }

  _tryPlaceWord(rawGrid, word, clue, placedWords) {
    const candidates = [];
    for (const placed of placedWords) {
      const crossDir = placed.direction === HORIZONTAL ? VERTICAL : HORIZONTAL;
      for (let pi = 0; pi < placed.word.length; pi++) {
        for (let wi = 0; wi < word.length; wi++) {
          if (word[wi] !== placed.word[pi]) continue;
          let newRow, newCol;
          if (crossDir === VERTICAL) {
            newRow = (placed.direction === HORIZONTAL ? placed.row : placed.row + pi) - wi;
            newCol =  placed.direction === HORIZONTAL ? placed.col + pi : placed.col;
          } else {
            newRow =  placed.direction === HORIZONTAL ? placed.row : placed.row + pi;
            newCol = (placed.direction === HORIZONTAL ? placed.col + pi : placed.col) - wi;
          }
          if (this._canPlace(rawGrid, word, newRow, newCol, crossDir, placedWords)) {
            const crossCount = this._countCrosses(rawGrid, word, newRow, newCol, crossDir);
            candidates.push({ word, clue, direction: crossDir, row: newRow, col: newCol, crossCount });
          }
        }
      }
    }
    if (candidates.length > 0) {
      candidates.sort((a, b) => b.crossCount - a.crossCount);
      const best = candidates[0];
      this._placeWord(rawGrid, best.word, best.row, best.col, best.direction);
      return { word: best.word, clue: best.clue, direction: best.direction, row: best.row, col: best.col };
    }
    return null;
  }

  _canPlace(rawGrid, word, row, col, direction, placedWords) {
    const size = this._GRID_SIZE;
    const len  = word.length;
    if (row < 0 || col < 0) return false;
    if (direction === HORIZONTAL && col + len > size) return false;
    if (direction === VERTICAL   && row + len > size) return false;
    if (direction === HORIZONTAL) {
      if (col > 0 && rawGrid[row][col - 1] !== null) return false;
      if (col + len < size && rawGrid[row][col + len] !== null) return false;
    } else {
      if (row > 0 && rawGrid[row - 1][col] !== null) return false;
      if (row + len < size && rawGrid[row + len][col] !== null) return false;
    }
    let hasCross = false;
    for (let i = 0; i < len; i++) {
      const r = direction === HORIZONTAL ? row     : row + i;
      const c = direction === HORIZONTAL ? col + i : col;
      const existing = rawGrid[r][c];
      if (existing !== null) {
        if (existing !== word[i]) return false;
        hasCross = true;
      } else {
        if (direction === HORIZONTAL) {
          const above = r > 0        ? rawGrid[r - 1][c] : null;
          const below = r < size - 1 ? rawGrid[r + 1][c] : null;
          if (above !== null || below !== null) return false;
        } else {
          const left  = c > 0        ? rawGrid[r][c - 1] : null;
          const right = c < size - 1 ? rawGrid[r][c + 1] : null;
          if (left !== null || right !== null) return false;
        }
      }
    }
    return hasCross;
  }

  _countCrosses(rawGrid, word, row, col, direction) {
    let count = 0;
    for (let i = 0; i < word.length; i++) {
      const r = direction === HORIZONTAL ? row     : row + i;
      const c = direction === HORIZONTAL ? col + i : col;
      if (rawGrid[r][c] === word[i]) count++;
    }
    return count;
  }

  _trimGrid(rawGrid) {
    let minRow = Infinity, maxRow = -Infinity;
    let minCol = Infinity, maxCol = -Infinity;
    for (let r = 0; r < rawGrid.length; r++) {
      for (let c = 0; c < rawGrid[r].length; c++) {
        if (rawGrid[r][c] !== null) {
          if (r < minRow) minRow = r; if (r > maxRow) maxRow = r;
          if (c < minCol) minCol = c; if (c > maxCol) maxCol = c;
        }
      }
    }
    if (minRow === Infinity) return { grid: [[]], rowOffset: 0, colOffset: 0 };
    const grid = [];
    for (let r = minRow; r <= maxRow; r++) {
      const row = [];
      for (let c = minCol; c <= maxCol; c++) {
        const letter = rawGrid[r][c];
        row.push(letter !== null ? { letter, blocked: false } : { letter: '', blocked: true });
      }
      grid.push(row);
    }
    return { grid, rowOffset: minRow, colOffset: minCol };
  }

  _numberWords(words, grid) {
    const rows = grid.length;
    const cols = rows > 0 ? grid[0].length : 0;
    const cellNumbers = {};
    let counter = 1;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (grid[r][c].blocked) continue;
        const isHStart = (c === 0 || grid[r][c - 1].blocked) && (c + 1 < cols && !grid[r][c + 1].blocked);
        const isVStart = (r === 0 || grid[r - 1][c].blocked) && (r + 1 < rows && !grid[r + 1][c].blocked);
        if (isHStart || isVStart) cellNumbers[`${r},${c}`] = counter++;
      }
    }
    return words.map(pw => ({
      number:    cellNumbers[`${pw.row},${pw.col}`] || 0,
      word:      pw.word,
      clue:      pw.clue,
      direction: pw.direction,
      row:       pw.row,
      col:       pw.col,
    })).sort((a, b) => a.number - b.number || a.direction.localeCompare(b.direction));
  }
}

/* ================================================================
   ADAPTER — convert engine output to UI format
   engine grid cell: { letter, blocked }
   UI grid cell:     truthy object with .letter  OR  null (black)
   ================================================================ */
function buildCrossword(entries) {
  if (!entries || !entries.length) return null;
  let result;
  try {
    const gen = new CrosswordGenerator(entries);
    result = gen.generate();
  } catch (e) {
    console.error('CrosswordGenerator error:', e);
    return null;
  }

  const { grid: engineGrid, words: engineWords, size } = result;

  // Convert grid: blocked cells → null, letter cells → { letter }
  const grid = engineGrid.map(row =>
    row.map(cell => cell.blocked ? null : { letter: cell.letter })
  );

  // Add id field and ensure number field
  const words = engineWords.map((w, idx) => ({ ...w, id: idx }));

  return { grid, rows: size.rows, cols: size.cols, words };
}

let selectedGrades = new Set(['3','4','5','6']);  // multi-select grade set

/** Get the active word pool based on language + library + grade + difficulty */
function getActivePool(diff) {
  if (currentLang === 'zh') {
    const pool = ZH_POOL[currentZhCat] || ZH_POOL.all;
    // difficulty: easy=2-3chars, medium=3-4chars, hard=4-7chars
    const minLen = diff === 'hard' ? 4 : 2;
    const maxLen = diff === 'easy' ? 3 : diff === 'medium' ? 4 : 7;
    return pool.filter(item => item.w.length >= minLen && item.w.length <= maxLen).map(item => item.w);
  }
  if (currentLib === 'common') {
    const { minLen, maxLen } = DIFFICULTY[diff];
    return WORD_BANK.filter(w => w.length >= minLen && w.length <= maxLen);
  }
  // PEP library — multi-grade filter
  const grades = selectedGrades.size === 0
    ? [3, 4, 5, 6]
    : [...selectedGrades].map(Number);
  const words = [...new Set(grades.flatMap(g => PEP_WORDS[g] || []))];
  return words;
}

function createWordRow(word = '', clue = '') {
  const row = document.createElement('div');
  row.className = 'word-row';
  row.innerHTML = `
    <input type="text" placeholder="单词 (英文)" class="word-input" value="${word.toUpperCase()}" maxlength="20"
      oninput="this.value=this.value.toUpperCase().replace(/[^A-Z]/g,'')">
    <input type="text" placeholder="提示语" class="clue-input" value="${clue}">
    <button class="btn-del" title="删除">✕</button>
  `;
  row.querySelector('.btn-del').addEventListener('click', () => {
    if (document.querySelectorAll('.word-row').length > 1) row.remove();
    else showToast('至少保留一行');
  });
  return row;
}

function getWordEntries() {
  return Array.from(document.querySelectorAll('.word-row')).map(r => ({

  })).filter(e => e.word.length >= 2);
}

/* ================================================================
   RENDER GRID
   ================================================================ */

function renderGrid(data) {
  const { grid, rows, cols, words } = data;
  gameState.grid = grid;
  gameState.rows = rows;
  gameState.cols = cols;
  gameState.words = words;
  gameState.selectedCell = null;
  gameState.playerInput = Array.from({ length: rows }, () => Array(cols).fill(''));

  const numMap = {};
  words.forEach(w => { if (!numMap[`${w.row},${w.col}`]) numMap[`${w.row},${w.col}`] = w.number; });

  const el = document.getElementById('crossword-grid');
  el.innerHTML = '';
  document.getElementById('crossword-grid').classList.toggle('lang-zh', currentLang === 'zh');
  const cs = currentLang === 'zh' ? 'var(--cell-size-zh)' : 'var(--cell-size)';
  el.style.gridTemplateColumns = `repeat(${cols}, ${cs})`;
  el.style.gridTemplateRows    = `repeat(${rows}, ${cs})`;
  el.closest('#crossword-grid') || el;
  document.getElementById('crossword-grid').classList.toggle('lang-zh', currentLang === 'zh');

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell' + (grid[r][c] ? '' : ' black');
      cell.dataset.r = r;
      cell.dataset.c = c;

      if (grid[r][c]) {
        const n = numMap[`${r},${c}`];
        if (n) {
          const numEl = document.createElement('div');
          numEl.className = 'cell-number';
          numEl.textContent = n;
          cell.appendChild(numEl);
        }
        const letEl = document.createElement('div');
        letEl.className = 'cell-letter';
        cell.appendChild(letEl);
        cell.addEventListener('click', () => {
          onCellClick(r, c);
          const cap = document.getElementById('cell-capture');
          cap.value = '';
          cap.focus({ preventScroll: true });
        });
      }
      el.appendChild(cell);
    }
  }

  document.removeEventListener('keydown', onKeyDown);
  document.addEventListener('keydown', onKeyDown);

  renderClues(words);
  setStatus(`已生成 ${words.length} 个${currentLang === 'zh' ? '词语' : '单词'}的填字格`, true);
}

/* ================================================================
   CLUE LISTS
   ================================================================ */

function renderClues(words) {
  const across = words.filter(w => w.direction === 'across').sort((a, b) => a.number - b.number);
  const down   = words.filter(w => w.direction === 'down').sort((a, b) => a.number - b.number);

  function buildList(list, elId) {
    const ul = document.getElementById(elId);
    ul.innerHTML = '';
    list.forEach(w => {
      const li = document.createElement('li');
      li.className = 'clue-item';
      li.dataset.wid = w.id;
      li.innerHTML = `<span class="clue-num">${w.number}.</span><span>${w.clue || w.word}</span>`;
      li.addEventListener('click', () => selectWord(w));
      ul.appendChild(li);
    });
  }
  buildList(across, 'across-clues');
  buildList(down, 'down-clues');
  document.getElementById('clue-section').style.display = 'block';
}

function updateActiveClue() {
  document.querySelectorAll('.clue-item').forEach(el => el.classList.remove('active'));
  if (!gameState.selectedCell) return;
  const { r, c } = gameState.selectedCell;
  const w = getWordAtCell(r, c, gameState.direction);
  if (w) {
    const li = document.querySelector(`.clue-item[data-wid="${w.id}"]`);
    if (li) { li.classList.add('active'); li.scrollIntoView({ block: 'nearest' }); }
  }
}

/* ================================================================
   SELECTION & HIGHLIGHT
   ================================================================ */

function onCellClick(r, c) {
  if (!gameState.grid[r][c]) return;
  if (gameState.selectedCell && gameState.selectedCell.r === r && gameState.selectedCell.c === c) {
    gameState.direction = gameState.direction === 'across' ? 'down' : 'across';
  } else {
    gameState.selectedCell = { r, c };
  }
  updateHighlight();
  updateActiveClue();
}

function selectWord(w) {
  gameState.direction = w.direction;
  gameState.selectedCell = { r: w.row, c: w.col };
  updateHighlight();
  updateActiveClue();
}

function getWordAtCell(r, c, dir) {
  return gameState.words.find(w => {
    if (w.direction !== dir) return false;
    if (dir === 'across') return w.row === r && c >= w.col && c < w.col + w.word.length;
    return w.col === c && r >= w.row && r < w.row + w.word.length;
  });
}

function updateHighlight() {
  document.querySelectorAll('.cell:not(.black)').forEach(el => el.classList.remove('selected', 'highlighted'));
  if (!gameState.selectedCell) return;
  const { r, c } = gameState.selectedCell;
  const selEl = cellEl(r, c);
  if (selEl) selEl.classList.add('selected');
  const w = getWordAtCell(r, c, gameState.direction);
  if (!w) return;
  if (w.direction === 'across') {
    for (let i = 0; i < w.word.length; i++) {
      const el = cellEl(w.row, w.col + i);
      if (el && !(w.row === r && w.col + i === c)) el.classList.add('highlighted');
    }
  } else {
    for (let i = 0; i < w.word.length; i++) {
      const el = cellEl(w.row + i, w.col);
      if (el && !(w.row + i === r && w.col === c)) el.classList.add('highlighted');
    }
  }
}

function cellEl(r, c) {
  return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

/* ================================================================
   KEYBOARD INPUT  (supports both English and Chinese IME)
   ================================================================ */

function isChineseChar(ch) {
  return ch && /[一-鿿㐀-䶿]/.test(ch);
}

function handleCharInput(ch) {
  if (!gameState.selectedCell) return;
  const { r, c } = gameState.selectedCell;
  if (!gameState.grid[r][c]) return;
  gameState.playerInput[r][c] = ch;
  updateCellDisplay(r, c);
  advance(r, c);
}

function onKeyDown(e) {
  if (!gameState.selectedCell) return;
  const { r, c } = gameState.selectedCell;
  if (!gameState.grid[r][c]) return;

  if (currentLang === 'en' && e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
    e.preventDefault();
    handleCharInput(e.key.toUpperCase());
  } else if (e.key === 'Backspace') {
    e.preventDefault();
    if (gameState.playerInput[r][c]) {
      gameState.playerInput[r][c] = '';
      updateCellDisplay(r, c);
    } else {
      retreat(r, c);
    }
  } else if (e.key === 'ArrowRight') { e.preventDefault(); gameState.direction = 'across'; moveTo(r, c + 1); }
    else if (e.key === 'ArrowLeft')  { e.preventDefault(); gameState.direction = 'across'; moveTo(r, c - 1); }
    else if (e.key === 'ArrowDown')  { e.preventDefault(); gameState.direction = 'down';   moveTo(r + 1, c); }
    else if (e.key === 'ArrowUp')    { e.preventDefault(); gameState.direction = 'down';   moveTo(r - 1, c); }
    else if (e.key === 'Tab') {
      e.preventDefault();
      const words = gameState.words.filter(w => w.direction === gameState.direction).sort((a, b) => a.number - b.number);
      const cur = getWordAtCell(r, c, gameState.direction);
      const idx = words.findIndex(w => w.id === cur?.id);
      const next = words[(idx + 1) % words.length];
      if (next) selectWord(next);
    }
}

/* Capture-input element: bridges IME composition into onKeyDown logic */
(function setupCaptureInput() {
  const cap = document.getElementById('cell-capture');
  cap.addEventListener('keydown', (e) => {
    // Forward navigation + backspace to the main handler
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Tab','Backspace'].includes(e.key)) {
      onKeyDown(e);
    }
  });
  cap.addEventListener('compositionend', (e) => {
    // Chinese IME finished — take first character
    const ch = e.data ? e.data[0] : '';
    if (currentLang === 'zh' && isChineseChar(ch)) handleCharInput(ch);
    cap.value = '';
  });
  cap.addEventListener('input', (e) => {
    if (e.isComposing) return;
    const v = cap.value;
    if (!v) return;
    const ch = v[v.length - 1];
    if (currentLang === 'en' && /[a-zA-Z]/.test(ch)) {
      handleCharInput(ch.toUpperCase());
    } else if (currentLang === 'zh' && isChineseChar(ch)) {
      handleCharInput(ch);
    }
    cap.value = '';
  });
})();

function updateCellDisplay(r, c) {
  const el = cellEl(r, c);
  if (!el) return;
  const letEl = el.querySelector('.cell-letter');
  if (letEl) letEl.textContent = gameState.playerInput[r][c] || '';
  el.classList.remove('correct', 'incorrect', 'revealed');
}

function advance(r, c) {
  if (gameState.direction === 'across') moveTo(r, c + 1); else moveTo(r + 1, c);
}
function retreat(r, c) {
  if (gameState.direction === 'across') moveTo(r, c - 1); else moveTo(r - 1, c);
}
function moveTo(r, c) {
  if (r < 0 || r >= gameState.rows || c < 0 || c >= gameState.cols) return;
  if (!gameState.grid[r][c]) return;
  gameState.selectedCell = { r, c };
  updateHighlight();
  updateActiveClue();
}

document.getElementById('btn-check').addEventListener('click', () => {
  if (!gameState.words.length) { showToast('请先生成游戏'); return; }
  let correct = 0, wrong = 0, empty = 0;
  for (let r = 0; r < gameState.rows; r++) {
    for (let c = 0; c < gameState.cols; c++) {
      if (!gameState.grid[r][c]) continue;
      const el = cellEl(r, c);
      if (!el) continue;
      el.classList.remove('correct', 'incorrect', 'revealed');
      const inp = gameState.playerInput[r][c];
      if (!inp) { empty++; continue; }
      if (inp === gameState.grid[r][c].letter) { el.classList.add('correct'); correct++; }
      else { el.classList.add('incorrect'); wrong++; }
    }
  }
  showToast(`正确 ${correct}  错误 ${wrong}  空格 ${empty}`);
});

  if (!entries.length) { showToast(currentLang === 'zh' ? '请输入至少一个词语' : '请输入至少一个单词（至少2个字母）'); return; }
  setStatus('正在生成...', false);
  const data = buildCrossword(entries);
  if (!data || !data.words.length) {
    setStatus('生成失败', false);
    showToast('无法生成填字格，请尝试调整单词（至少需要共享字母才能交叉）');

  renderGrid(data);
  const skipped = entries.length - data.words.length;
  showToast(skipped > 0
    ? `成功放置 ${data.words.length} 个单词，${skipped} 个单词无法交叉已跳过`
    : `成功生成！共 ${data.words.length} 个单词`);
});

/* ================================================================
   RANDOM GAME GENERATION
   ================================================================ */

/** Fisher-Yates shuffle */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/**
 * Try to pick 'count' words from the bank that can form a valid crossword.
 * Strategy: random-sample, generate, retry up to 10 times if too few words placed.
 * Chinese mode uses its own word count targets and pool.
 */
/**
 * Select a set of Chinese words that are likely to interconnect on the grid.
 * Uses a character-connectivity graph: greedily expands from a high-degree seed
 * word, always picking the next word that shares the most characters with the
 * already-selected set.  Randomises the starting seed so each call is different.
 *
 * @param {Array<{w,c}>} pool      - candidate word objects
 * @param {number}       supply    - how many connected words to return
 * @returns {Array<{w,c}>}
 */
function selectConnectedZhWords(pool, supply) {
  if (pool.length <= supply) return shuffle([...pool]);

  // Build char → [indices] map
  const charMap = {};
  pool.forEach((item, idx) => {
    for (const ch of item.w) {
      if (!charMap[ch]) charMap[ch] = [];
      charMap[ch].push(idx);
    }
  });

  // Score each word by how many OTHER words it shares a character with
  const degree = pool.map((item, idx) => {
    const nbrs = new Set();
    for (const ch of item.w) (charMap[ch] || []).forEach(j => { if (j !== idx) nbrs.add(j); });
    return nbrs.size;
  });

  // Pick a random high-degree seed (top 20%)
  const sorted = degree.map((d, i) => i).sort((a, b) => degree[b] - degree[a]);
  const topN   = Math.max(1, Math.floor(pool.length * 0.2));
  const seed   = sorted[Math.floor(Math.random() * topN)];

  const selected = new Set([seed]);
  const frontier = new Set();
  for (const ch of pool[seed].w) (charMap[ch] || []).forEach(j => { if (j !== seed) frontier.add(j); });

  while (selected.size < supply && frontier.size > 0) {
    // Pick frontier word maximising shared characters with already-selected words
    let bestIdx = -1, bestScore = -1;
    for (const idx of frontier) {
      let score = 0;
      for (const ch of pool[idx].w) (charMap[ch] || []).forEach(j => { if (selected.has(j)) score++; });
      if (score > bestScore) { bestScore = score; bestIdx = idx; }
    }
    if (bestIdx === -1) break;
    selected.add(bestIdx);
    frontier.delete(bestIdx);
    for (const ch of pool[bestIdx].w) (charMap[ch] || []).forEach(j => { if (!selected.has(j)) frontier.add(j); });
  }

  // If still short, pad with random words
  const remaining = pool.map((_, i) => i).filter(i => !selected.has(i));
  shuffle(remaining);
  for (const i of remaining) {
    if (selected.size >= supply) break;
    selected.add(i);
  }

  return [...selected].map(i => pool[i]);
}

function pickAndGenerate(diff) {
  /* ── Chinese mode ────────────────────────────────────────────── */
  if (currentLang === 'zh') {
    const minLen = diff === 'hard' ? 4 : 2;
    const maxLen = diff === 'easy' ? 3 : diff === 'medium' ? 4 : 7;
    // Target = desired placed words; supply = candidates fed to generator
    const target = diff === 'easy' ? 12 : diff === 'medium' ? 10 : 8;
    const supply = diff === 'easy' ? 40 : diff === 'medium' ? 35 : 28;

    const pool = (ZH_POOL[currentZhCat] || ZH_POOL.all)
      .filter(item => item.w.length >= minLen && item.w.length <= maxLen);
    if (pool.length === 0) { showToast('词库中没有符合条件的词语'); return null; }

    let best = null;
    for (let attempt = 0; attempt < 12; attempt++) {
      // Use connectivity-aware selection for better intersection chances
      const sample  = selectConnectedZhWords(pool, Math.min(supply, pool.length));
      const entries = sample.map(item => ({ word: item.w, clue: item.c }));
      const data    = buildCrossword(entries);
      if (!best || (data && data.words.length > best.words.length)) best = data;
      if (best && best.words.length >= target) break;
    }
    return best;
  }

  /* ── English mode ────────────────────────────────────────────── */
  const { count } = DIFFICULTY[diff];
  const pool = getActivePool(diff);
  if (pool.length === 0) { showToast('词库中没有符合条件的单词'); return null; }

  for (let attempt = 0; attempt < 10; attempt++) {
    const sample  = shuffle(pool).slice(0, Math.min(count + 6, pool.length));
    const entries = sample.map(w => ({ word: w, clue: makeClue(w) }));
    const data    = buildCrossword(entries);
    if (data && data.words.length >= Math.min(count, pool.length)) return data;
    if (data && data.words.length >= 5) return data;
  }
  const sample = shuffle(pool).slice(0, count);
  return buildCrossword(sample.map(w => ({ word: w, clue: makeClue(w) })));
}

/** Update the word editor rows to show which words were used */
function syncEditorRows(words) {
  const container = document.getElementById('word-rows');
  container.innerHTML = '';
  words.forEach(w => {
    container.appendChild(createWordRow(w.word, w.clue));
  });
  // Ensure at least 1 row
  if (!words.length) container.appendChild(createWordRow());
}

/* ================================================================
   CUSTOM PRINT  — only grid + clues, no editor UI
   ================================================================ */
function buildPrintGrid(showAnswers) {
  const cellSize = 36;
  const cols = gameState.cols;
  const rows = gameState.rows;
  /* Map answer letters from the live grid inputs */
  const inputEls = document.querySelectorAll('.cell-input');
  const answers = {};
  inputEls.forEach(el => {
    const r = parseInt(el.dataset.r), c = parseInt(el.dataset.c);
    answers[`${r},${c}`] = el.value.toUpperCase();
  });

  let html = `<table style="border-collapse:collapse;margin:0 auto 24px;">`;
  for (let r = 0; r < rows; r++) {
    html += '<tr>';
    for (let c = 0; c < cols; c++) {
      const cell = gameState.grid[r][c];
      if (!cell) {
        html += `<td style="width:${cellSize}px;height:${cellSize}px;background:#111;border:1px solid #333;"></td>`;
      } else {
        const word = gameState.words.find(w => w.row === r && w.col === c);
        const num  = word
          ? `<span style="position:absolute;top:1px;left:2px;font-size:8px;font-weight:700;color:#444;line-height:1;">${word.number}</span>`
          : '';
        const letter = showAnswers
          ? `<span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#1d4ed8;">${cell.letter}</span>`
          : '';
        html += `<td style="width:${cellSize}px;height:${cellSize}px;border:1px solid #999;position:relative;background:#fff;">${num}${letter}</td>`;
      }
    }
    html += '</tr>';
  }
  html += '</table>';
  return html;
}

  const win = window.open('', '_blank', 'width=820,height=740');
  win.document.write(`<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <title>Crossword Puzzle${showAnswers ? ' - Answer Key' : ''}</title>
    <style>
      * { box-sizing:border-box; margin:0; padding:0; }
      body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; padding:32px 24px; background:#fff; }
      h1 { text-align:center; font-size:20px; margin-bottom:4px; color:#111; }
      .label { text-align:center; font-size:13px; color:${showAnswers ? '#dc2626' : '#6b7280'}; margin-bottom:6px; font-weight:600; }
      p.sub { text-align:center; font-size:12px; color:#9ca3af; margin-bottom:24px; }
      .btn-row { display:flex; justify-content:center; gap:10px; margin-top:28px; }
      .btn { padding:9px 22px; border:none; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; }
      .btn-print { background:#2563eb; color:#fff; }
      .btn-toggle { background:#f3f4f6; color:#374151; border:1px solid #d1d5db; }
      @media print {
        body { padding:10px; }
        .btn-row { display:none !important; }
        @page { margin:1cm; }
      }
    </style>
  </head><body>
    <h1>Crossword Puzzle</h1>
    <div class="label">${showAnswers ? '答案版 Answer Key' : '练习版 Student Copy'}</div>
    <p class="sub">${gameState.words.length} words &nbsp;|&nbsp; ${rows} × ${cols}</p>
    ${gridHtml}
    <hr style="border:none;border-top:1px solid #e5e7eb;margin-bottom:20px;">
    ${cluesHtml}
    <div class="btn-row">
      <button class="btn btn-print" onclick="window.print();">打印 / Print</button>
    </div>
  </body></html>`);
  win.document.close();
  win.focus();
}

function printGame() {
  if (!gameState.words.length) { showToast('请先生成游戏再打印'); return; }

  /* Show a small modal to choose print mode */
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:12px;padding:28px 32px;width:320px;box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center;">
      <div style="font-size:16px;font-weight:700;color:#111;margin-bottom:6px;">选择打印版本</div>
      <div style="font-size:13px;color:#6b7280;margin-bottom:22px;">Select print version</div>
      <button id="pm-student" style="display:block;width:100%;padding:11px;margin-bottom:10px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">
        练习版（无答案）
        <span style="display:block;font-size:11px;font-weight:400;opacity:.85;margin-top:2px;">Student Copy — blank grid</span>
      </button>
      <button id="pm-answer" style="display:block;width:100%;padding:11px;margin-bottom:18px;background:#fff;color:#dc2626;border:2px solid #dc2626;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">
        答案版（含答案）
        <span style="display:block;font-size:11px;font-weight:400;opacity:.8;margin-top:2px;">Answer Key — letters filled</span>
      </button>
      <button id="pm-cancel" style="background:none;border:none;color:#9ca3af;font-size:13px;cursor:pointer;">取消 Cancel</button>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#pm-student').onclick = () => { document.body.removeChild(overlay); openPrintWindow(false); };
  overlay.querySelector('#pm-answer').onclick  = () => { document.body.removeChild(overlay); openPrintWindow(true);  };
  overlay.querySelector('#pm-cancel').onclick  = () => document.body.removeChild(overlay);
  overlay.onclick = (e) => { if (e.target === overlay) document.body.removeChild(overlay); };
}

document.getElementById('btn-print').addEventListener('click', printGame);

setStatus('等待生成游戏...');
</script>
</body>
</html>
